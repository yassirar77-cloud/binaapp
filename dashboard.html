<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BinaApp · Projects</title>
  <meta http-equiv="refresh" content="0; url=/my-projects" />
  <link rel="canonical" href="/my-projects" />
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #F7F7FA;
      color: #0B0B15;
      letter-spacing: -0.01em;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid rgba(11, 11, 21, 0.08);
      border-radius: 16px;
      padding: 32px 36px;
      max-width: 420px;
      box-shadow: 0 1px 2px rgba(11,11,21,0.06), 0 8px 24px rgba(11,11,21,0.04);
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #EFEDFF;
      color: #2A1FB8;
      font-size: 12px;
      font-weight: 500;
    }
    h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; letter-spacing: -0.02em; }
    p { font-size: 14px; color: #5A5A6E; margin: 0 0 20px; line-height: 1.5; }
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 18px;
      border-radius: 12px;
      background: #4F3DFF;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.15s ease;
    }
    a.btn:hover { background: #3D2BE0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="badge">Moved</span>
      <h1>This page has moved</h1>
      <p>The project dashboard now lives at <code>/my-projects</code>. You'll be redirected automatically.</p>
      <a class="btn" href="/my-projects">Open my projects</a>
    </div>
  </div>
  <script>window.location.replace('/my-projects');</script>
</body>
</html>
