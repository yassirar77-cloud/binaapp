<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Upgrade Required — BinaApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #fff7ed 0%, #fed7aa 100%);
            padding: 20px; color: #1f2937;
        }
        .card {
            max-width: 480px; width: 100%; background: white; border-radius: 24px;
            padding: 48px 32px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.75rem; margin-bottom: 12px; }
        p { color: #4b5563; line-height: 1.6; margin-bottom: 12px; }
        .price { font-size: 1.25rem; font-weight: 600; color: #ea580c; margin: 16px 0; }
        a.cta {
            display: inline-block; margin-top: 16px; padding: 14px 28px;
            background: #ea580c; color: white; text-decoration: none;
            border-radius: 10px; font-weight: 600;
        }
        a.cta:hover { background: #c2410c; }
        .small { font-size: 0.875rem; color: #6b7280; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 This site is almost ready!</h1>
        <p>The owner is on BinaApp's Free plan, which doesn't include publishing to a public subdomain.</p>
        <div class="price">Starter — RM5/month</div>
        <p>Upgrade to make this site live at <strong>yourname.binaapp.my</strong>.</p>
        <a class="cta" href="https://binaapp.my/dashboard/billing">Upgrade Now</a>
        <p class="small">Are you the owner? Log in to your dashboard to upgrade.</p>
    </div>
</body>
</html>
