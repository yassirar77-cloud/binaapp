services:
  - type: web
    name: binaapp-backend
    runtime: python
    plan: starter
    region: singapore
    rootDir: backend

    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Force correct Python behavior
      - key: PYTHON_VERSION
        value: "3.11.7"

      # Playwright browser installation enabled in build.sh
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/.cache/ms-playwright"

      # Database
      - key: DATABASE_URL
        sync: false

      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Auth / Security
      - key: JWT_SECRET_KEY
        sync: false

      # AI APIs
      - key: QWEN_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

      # Payments
      - key: STRIPE_SECRET_KEY
        sync: false

      # Email (Zoho SMTP). REQUIRED for the email-verification code to send.
      # Set the secret values in the Render dashboard. If SMTP_USER /
      # SMTP_PASSWORD are missing, /register fails fast (503) rather than
      # creating accounts that never receive their verification code.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: NOREPLY_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false

      # App config
      - key: FRONTEND_URL
        value: "https://binaapp.my"
      - key: ENVIRONMENT
        value: "production"

    healthCheckPath: /health
    autoDeploy: true  # Auto-deploy on git push

  - type: cron
    name: binaapp-subscription-cron
    runtime: python
    plan: starter
    region: singapore
    rootDir: backend

    # Daily at 16:00 UTC = 00:00 Malaysia time (UTC+8) the next day
    schedule: "0 16 * * *"

    buildCommand: ./build.sh
    startCommand: python cron_runner.py

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"

      # Safety gate. Set to "false" in the Render dashboard once the first
      # dry-run log has been reviewed.
      - key: SUBSCRIPTION_CRON_DRY_RUN
        value: "true"

      # Supabase (shared with the web service)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Email (used by reminder + lock notice templates)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SUPPORT_EMAIL
        sync: false

      # App config (used to build payment URLs in emails)
      - key: FRONTEND_URL
        value: "https://binaapp.my"
      - key: ENVIRONMENT
        value: "production"
